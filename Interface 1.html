<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>真名镜鉴</title>
</head>
<link rel="stylesheet" href="2.0/css/Interface 1.css">
<body>
    <!-- 滚动社会主义核心价值观-->
    <div class="values-marquee">
        <div class="scroll-text">
            ✦ 富强 民主 文明 和谐 自由 平等 公正 法治 爱国 敬业 诚信 友善 ✦ 富强 民主 文明 和谐 自由 平等 公正 法治 爱国 敬业 诚信 友善 ✦
        </div>
    </div>

    <div class="glass-card">
        <div class="question-area">
            <div class="question">我是谁</div>
            <div class="sub-tip">✦ 真名即密钥 · 启门之音 ✦</div>
        </div>
        <hr>
        <div class="input-group">
            <input type="text" id="answerInput" class="cyber-input" placeholder="在此键入你的答案" autocomplete="off">
            <button id="verifyBtn" class="btn-submit">确 认 身 份</button>
        </div>

        <!-- 信息面板：错误次数 + 上次尝试时间 + 动态错误提醒 -->
        <div class="info-panel">
            <div class="info-row">
                <span class="info-label"><span class="dot-accent"></span> 错 误 次 数</span>
                <span id="attemptCount" class="badge-count">0</span>
            </div>
            <div class="info-row">
                <span class="info-label">⏱️ 上 次 尝 试</span>
                <span id="lastAttemptTime" style="font-family: monospace; font-size:0.8rem;">——</span>
            </div>
            <div id="errorMsgArea" class="error-message">
                <span>⚠️</span> <span id="errorText">等待验证</span>
            </div>
        </div>
        <footer>⌨️ 回车亦可确认 · 心诚则门开</footer>
    </div>
</body>
<script src="2.0/js/Interface 1.js"></script>
</html>
